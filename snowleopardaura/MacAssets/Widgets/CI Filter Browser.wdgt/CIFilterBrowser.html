<html><head><style type="text/css">	@import "CIFilterBrowser.css";</style><script type='text/javascript' src='Stretcher.js' charset='utf-8'/><script type='text/javascript' src='Scroller.js' charset='utf-8'/><script type='text/javascript' src='CIFilterBrowser.js' charset='utf-8'/></head><body onload='setup();' oncopy='generalBodyCopyFunction(event);'>	<!--     <div id="front" onmousemove='mousemove(event);' onmouseout='mouseexit(event);'>-->    <div id="front">	<!-- Front side (do not remove) -->			<div id='main'>			<div id='topBar'>				<div id='topCenter'>					<input id='filterSearch' type="search" onsearch='searchForFilter();' style="float:right" results=5 incremental />					<div id='widgetTitle'>CI Filter Browser</div>				</div>			</div>			<div id='centerContent'>				<div id='centerLeft'></div>				<div id='centerRight'></div>				<div id='centerCenter'>					<div id='browser'>																<div id='scrollAreaCategoryDiv'>							<div id='parentCategoryDiv'>								<div class='mainContent' id="categoryList">									<table id="categoryTable" border="0" cellspacing="0" cellpadding="0">									<tbody id='categorytbody'></tbody>									</table>								</div>							</div>							<div id='categoryScroller'>								<div id='categoryScrollTrack' onmousedown='mouseDownTrack(categoryScroller, event);' onmouseup='mouseUpTrack(categoryScroller, event);'>									<div class='scrollTrackTop' id='categoryScrollTrackTop'></div>									<div class='scrollTrackMid' id='categoryScrollTrackMid'></div>									<div class='scrollTrackBot' id='categoryScrollTrackBot'></div>								</div>								<div class='scrollThumb' id='categoryScrollThumb' onmousedown='mouseDownScrollThumb(categoryScroller, event);'>									<div class='scrollThumbTop' id='categoryScrollThumbTop'></div>									<div class='scrollThumbMid' id='categoryScrollThumbMid'></div>									<div class='scrollThumbBot' id='categoryScrollThumbBot'></div>								</div>							</div>						</div>						<div id='scrollAreaFilterDiv'>							<div id='parentFilterDiv'>								<div class='mainContent' id="filterList">									<table id="filterTable" border="0" cellspacing="0" cellpadding="0">									<tbody id='filtertbody'></tbody>									</table>								</div>							</div>							<div id='filterScroller'>								<div id='filterScrollTrack' onmousedown='mouseDownTrack(filterScroller, event);' onmouseup='mouseUpTrack(filterScroller, event);'>									<div class='scrollTrackTop' id='filterScrollTrackTop'></div>									<div class='scrollTrackMid' id='filterScrollTrackMid'></div>									<div class='scrollTrackBot' id='filterScrollTrackBot'></div>								</div>								<div class='scrollThumb' id='filterScrollThumb' onmousedown='mouseDownScrollThumb(filterScroller, event);'>									<div class='scrollThumbTop' id='filterScrollThumbTop'></div>									<div class='scrollThumbMid' id='filterScrollThumbMid'></div>									<div class='scrollThumbBot' id='filterScrollThumbBot'></div>								</div>							</div>						</div>					</div>					<div id='filterInfoAreaDiv'>						<div id='filterInfoScrollAreaDiv'>							<div id='parentFilterInfoDiv'>								<div class='mainContent' id="filterInfoList">									<table width="306" border="0" cellspacing="0" cellpadding="0" >									<TR width="305"><TD><span id="filterDescription" class='infoElementTitle'>Description not available</span></TD></TR>									<TR width="305"><TD><span class='infoSpacer'></span></TD></TR>									<TR width="305"><TD><span id="availabilityInformation" class='infoElementTitle'>Availability</span></TD></TR>									<TR width="305"><TD><span class='infoSpacer'></span></TD></TR>									<TR width="305"><TD><span id="categoryTitle" class='infoHeader'>Categories</span></TD></TR>									<TR width="305"><TD id="categories" class='infoElement'></TD></TR>									<TR width="305"><TD><span class='infoSpacer'></span></TD></TR>									<TR width="305"><TD><span id="inputKeysTitle" class='infoHeader'>Input Keys</span></TD></TR>									<TR width="305"><TD>											<div  id="inputKeysList">												<table id="inputKeysTable" border="0" cellspacing="0" cellpadding="0">												<tbody id='inputKeystbody'></tbody>												</table>											</div>									</TD></TR>									</table>								</div>							</div>							<div id='filterInfoScroller'>								<div id='filterInfoScrollTrack' onmousedown='mouseDownTrack(filterInfoScroller, event);' onmouseup='mouseUpTrack(filterInfoScroller, event);'>									<div class='scrollTrackTopTrans' id='filterInfoScrollTrackTop'></div>									<div class='scrollTrackMid' id='filterInfoScrollTrackMid'></div>									<div class='scrollTrackBotTrans' id='filterInfoScrollTrackBot'></div>								</div>								<div class='scrollThumb' id='filterInfoScrollThumb' onmousedown='mouseDownScrollThumb(filterInfoScroller, event);'>									<div class='scrollThumbTop' id='filterInfoScrollThumbTop'></div>									<div class='scrollThumbMid' id='filterInfoScrollThumbMid'></div>									<div class='scrollThumbBot' id='filterInfoScrollThumbBot'></div>								</div>							</div>						</div>					</div>					<div  id='filterInfoHeaderDiv' onclick='showFilterRefDoc()'>						<table id="filterInfoTable" width="326" border="0" cellspacing="0" cellpadding="0">							<TR class="titleRow"><TD><span class='filterTitle' id="filterTitle">filterTitle</span><span>  </span><span id="filterSubTitle">filterSubTitle</span></TD></TR>						</table>					</div>										<div id='filterPreviewContent' onclick="stretcher.stretch(event);" onmouseover='enterPreview(event);' onmouseout='exitPreview(event)'>						<span class="elementTitle" id="fitlerPreviewTitle">Filter Preview<br></span>																		<div id='filterPreviewAreaDiv'>							<div id='parentFilterPreviewDiv'>								<div class='mainContent' id="filterPreviewList">									<table id="filterInfoTable" border="0" cellspacing="0" cellpadding="0" >									<TR><TD>											<div  id="inputImageList">												<table id="inputImageTable" border="0" cellspacing="0" cellpadding="0">												<tbody id='inputImagetbody'></tbody>												</table>											</div>									</TD></TR>									</table>								</div>							</div>							<div id='filterPreviewScroller'>								<div id='filterPreviewScrollTrack' onmousedown='mouseDownTrack(filterPreviewScroller, event);' onmouseup='mouseUpTrack(filterPreviewScroller, event);'>									<div class='scrollTrackTopTrans' id='filterPreviewScrollTrackTop'></div>									<div class='scrollTrackMid' id='filterPreviewScrollTrackMid'></div>									<div class='scrollTrackBotTrans' id='filterPreviewScrollTrackBot'></div>								</div>								<div class='scrollThumb' id='filterPreviewScrollThumb' onmousedown='mouseDownScrollThumb(filterPreviewScroller, event);'>									<div class='scrollThumbTop' id='filterPreviewScrollThumbTop'></div>									<div class='scrollThumbMid' id='filterPreviewScrollThumbMid'></div>									<div class='scrollThumbBot' id='filterPreviewScrollThumbBot'></div>								</div>							</div>						</div>						<div id='filterPreviewView'>							<span class="elementSubTitle">OutputImage<br></span> 							<embed id="CIPluginPreview" name="CIPluginPreview" width="180px" height="180px" src="tiger.jpg" type="x-cipreview/x-cipreview"></embed>						</div>					</div>									</div>			</div>						<div id='bottomBar' >								<div id='bottomCenter'>									</div>				<!-- The following elements comprise the info button, present in the bottom right of thw widget upon mouse over -->				<!--				<div class='flip' id='fliprollie'></div>				<div class='flip' id='flip' onclick='showPrefs(event);' onmouseover='enterflip(event);' onmouseout='exitflip(event)';></div>				-->			</div>			</div>				<div id='debugDiv'></div>		<!-- End Front side (do not remove) -->	    </div>    <!-- The back div is the preferences UI of the widget.  It is hidden by the style sheet and shown by the showPrefs() function       -->	<!-- Back side (do not remove)     <div id="back">			<img span="backgroundImage" src="Default_reverse.png">  							<img class="doneButton" src="Images/done.png" onclick='hidePrefs()' />			    </div>	End Back side (do not remove) -->	</body></html><!--        Copyright _ 2005, Apple Computer, Inc.  All rights reserved.NOTE:  Use of this source code is subject to the terms of the SoftwareLicense Agreement for Mac OS X, which accompanies the code.  Your useof this source code signifies your agreement to such license terms andconditions.  Except as expressly granted in the Software License Agreementfor Mac OS X, no other copyright, patent, or other intellectual propertylicense or right is granted, either expressly or by implication, by Apple.-->
