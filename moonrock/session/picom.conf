# CopyCatOS picom compositor configuration
# Exists solely to enable ARGB transparency for dock, menubar, spotlight.
# All visual effects (shadows, animations) are handled by moonrock, not picom.

backend = "glx";
vsync = true;

# Disable ALL picom visual effects — we handle our own
shadow = false;
fading = false;
inactive-opacity = 1.0;
frame-opacity = 1.0;
inactive-dim = 0.0;

# Don't apply any opacity rules — let each window control its own alpha
opacity-rule = [];

# Window type rules
wintypes:
{
    dock = { shadow = false; };
    desktop = { shadow = false; };
    tooltip = { shadow = false; opacity = 0.95; };
    popup_menu = { shadow = false; opacity = 0.95; };
    dropdown_menu = { shadow = false; opacity = 0.95; };
};
